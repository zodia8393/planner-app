 <div class="work-card rounded-xl p-4 card-hover fade-in group relative touch-item" data-log-id="{{ log.id }}">
 <div class="flex items-start justify-between">
 <div class="flex-1 min-w-0">
 <div class="flex items-center gap-2 mb-1">
 <p class="text-sm font-bold truncate" style="color: var(--color-text);">{{ log.title }}</p>
 {% if log.hours > 0 %}
 <span class="text-xs px-2 py-0.5 rounded-full font-medium flex-shrink-0" style="background: var(--color-accent-soft); color: var(--color-accent);">{{ log.hours }}h</span>
 {% endif %}
 </div>
 {% if log.content %}
 <div class="text-sm whitespace-pre-line leading-relaxed mb-1">{{ log.content|render_images }}</div>
 {% endif %}
 <div class="flex items-center gap-2 mt-1">
 {% if log.category_name %}
 <span class="inline-flex items-center gap-1 text-xs font-medium px-2 py-0.5 rounded-full"
 style="background:{{ log.category_color }}15; color:{{ log.category_color }}">
 <span class="w-1.5 h-1.5 rounded-full" style="background:{{ log.category_color }}"></span>
 {{ log.category_name }}
 </span>
 {% endif %}
 <span class="text-xs" style="color: var(--color-text-muted);">{{ log.created_at|format_datetime }}</span>
 </div>
 </div>
 <div class="flex items-center gap-1 flex-shrink-0 ml-2">
 <button hx-get="/worklogs/{{ log.id }}/edit" hx-target="closest [data-log-id]" hx-swap="outerHTML"
 class="p-2 rounded hover-accent-bg hover-accent transition-all" aria-label="편집">
 <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
 <path stroke-linecap="round" stroke-linejoin="round" d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L10.582 16.07a4.5 4.5 0 01-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 011.13-1.897l8.932-8.931zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0115.75 21H5.25A2.25 2.25 0 013 18.75V8.25A2.25 2.25 0 015.25 6H10" />
 </svg>
 </button>
 <button onclick="undoDelete(this.closest('[data-log-id]'), '/worklogs/{{ log.id }}')"
 class="p-2 rounded hover-danger-bg hover-danger transition-all" aria-label="닫기">
 <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
 <path stroke-linecap="round" stroke-linejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0" />
 </svg>
 </button>
 </div>
 </div>
 </div>

<div class="work-card rounded-xl p-5 fade-in border-2" style="border-color: var(--color-accent);" id="todo-{{ todo.id }}">
 <form hx-put="/todos/{{ todo.id }}" hx-target="#todo-{{ todo.id }}" hx-swap="outerHTML" class="space-y-3">
 <div class="flex items-center justify-between mb-2">
 <h4 class="font-bold text-sm" style="color: var(--color-accent);">편집</h4>
 <a href="/todos" hx-boost="false" class="text-xs hover-text">취소</a>
 </div>
 <input type="text" name="title" value="{{ todo.title }}" required
 class="w-full px-4 py-2.5 text-sm border rounded-lg focus:ring-2 focus:ring-amber-400">
 <textarea name="description" rows="2" placeholder="설명"
 class="w-full px-4 py-2 text-sm border rounded-lg focus:ring-2 focus:ring-amber-400">{{ todo.description }}</textarea>
 <div class="flex flex-wrap gap-2">
 <input type="date" name="due_date" value="{{ todo.due_date or '' }}"
 class="px-3 py-1.5 text-sm border rounded-lg"
 style="color-scheme: light dark">
 <select name="priority" class="px-3 py-1.5 text-sm border rounded-lg">
 {% for pk, pv in priority_map.items() %}
 <option value="{{ pk }}" {% if pk == todo.priority %}selected{% endif %}>{{ pv.label }}</option>
 {% endfor %}
 </select>
 <select name="category_id" class="px-3 py-1.5 text-sm border rounded-lg">
 <option value="">카테고리</option>
 {% for cat in categories %}
 <option value="{{ cat.id }}" {% if cat.id == todo.category_id %}selected{% endif %}>{{ cat.name }}</option>
 {% endfor %}
 </select>
 {% set is_custom_rrule = todo.repeat_type and todo.repeat_type.startswith('FREQ=') %}
 <select name="repeat_type" id="editRepeatType_{{ todo.id }}" onchange="toggleEditRrule({{ todo.id }})"
 class="px-3 py-1.5 text-sm border rounded-lg">
 {% for rk, rv in repeat_map.items() %}
 <option value="{{ rk }}" {% if (not is_custom_rrule and rk == todo.repeat_type) or (is_custom_rrule and rk == 'custom') %}selected{% endif %}>{{ rv }}</option>
 {% endfor %}
 </select>
 <select name="energy_level" class="px-3 py-1.5 text-sm border rounded-lg">
 <option value="1" {% if todo.energy_level == 1 %}selected{% endif %}>🟢 저에너지</option>
 <option value="2" {% if not todo.energy_level or todo.energy_level == 2 %}selected{% endif %}>🔵 보통</option>
 <option value="3" {% if todo.energy_level == 3 %}selected{% endif %}>🔥 고에너지</option>
 </select>
 </div>
 <!-- Custom RRULE builder -->
 <div id="editRrulePanel_{{ todo.id }}" class="{% if not is_custom_rrule %}hidden{% endif %} p-3 border rounded-lg space-y-2">
 <div class="flex items-center gap-2">
 <span class="text-xs whitespace-nowrap" style="color: var(--color-text-muted);">매</span>
 <input type="number" name="rrule_interval" value="{{ todo._rrule_interval if is_custom_rrule else 1 }}" min="1" max="99"
 class="w-16 px-2.5 py-1.5 text-xs border rounded-lg" style="background: var(--color-surface);">
 <select name="rrule_freq" id="editRruleFreq_{{ todo.id }}" onchange="toggleEditRruleExtra({{ todo.id }})"
 class="px-2.5 py-1.5 text-xs border rounded-lg" style="background: var(--color-surface);">
 <option value="DAILY" {% if is_custom_rrule and todo._rrule_freq == 'DAILY' %}selected{% endif %}>일</option>
 <option value="WEEKLY" {% if is_custom_rrule and todo._rrule_freq == 'WEEKLY' %}selected{% endif %}>주</option>
 <option value="MONTHLY" {% if is_custom_rrule and todo._rrule_freq == 'MONTHLY' %}selected{% endif %}>개월</option>
 <option value="YEARLY" {% if is_custom_rrule and todo._rrule_freq == 'YEARLY' %}selected{% endif %}>년</option>
 </select>
 </div>
 <div id="editBydayRow_{{ todo.id }}" class="{% if not (is_custom_rrule and todo._rrule_freq == 'WEEKLY') %}hidden{% endif %} flex flex-wrap gap-1">
 {% for code, label in rrule_day_options %}
 <label class="flex items-center gap-1 px-2.5 py-1.5 text-xs border rounded-lg cursor-pointer hover-accent-bg" style="background: var(--color-surface);">
 <input type="checkbox" class="rrule-byday-edit-{{ todo.id }}" value="{{ code }}" {% if is_custom_rrule and code in (todo._rrule_byday or []) %}checked{% endif %}>
 {{ label }}
 </label>
 {% endfor %}
 </div>
 <div id="editBymonthdayRow_{{ todo.id }}" class="{% if not (is_custom_rrule and todo._rrule_freq == 'MONTHLY') %}hidden{% endif %}">
 <input type="text" name="rrule_bymonthday" placeholder="날짜 (쉼표구분, 예: 1,15)" value="{{ todo._rrule_bymonthday_str if is_custom_rrule else '' }}"
 class="w-full px-2.5 py-1.5 text-xs border rounded-lg" style="background: var(--color-surface);">
 </div>
 <div class="flex items-center gap-2">
 <span class="text-xs whitespace-nowrap" style="color: var(--color-text-muted);">종료:</span>
 <select name="rrule_end_type" id="editRruleEndType_{{ todo.id }}" onchange="toggleEditEndFields({{ todo.id }})"
 class="px-2.5 py-1.5 text-xs border rounded-lg" style="background: var(--color-surface);">
 <option value="never" {% if is_custom_rrule and not todo._rrule_count and not todo._rrule_until %}selected{% endif %}>무제한</option>
 <option value="count" {% if is_custom_rrule and todo._rrule_count %}selected{% endif %}>횟수</option>
 <option value="until" {% if is_custom_rrule and todo._rrule_until %}selected{% endif %}>날짜</option>
 </select>
 <input type="number" name="rrule_count" id="editRruleCount_{{ todo.id }}" min="1" max="999" value="{{ todo._rrule_count or 10 }}" placeholder="횟수"
 class="{% if not (is_custom_rrule and todo._rrule_count) %}hidden{% endif %} w-20 px-2 py-1 text-xs border rounded-lg" style="background: var(--color-surface);">
 <input type="date" name="rrule_until" id="editRruleUntil_{{ todo.id }}" value="{{ todo._rrule_until or '' }}"
 class="{% if not (is_custom_rrule and todo._rrule_until) %}hidden{% endif %} px-2 py-1 text-xs border rounded-lg" style="background: var(--color-surface); color-scheme: light dark;">
 </div>
 {% if is_custom_rrule %}
 <div class="text-[11px] text-amber-500">{{ rrule_to_korean(todo.repeat_type) }}</div>
 {% endif %}
 </div>
 <input type="hidden" name="rrule_byday" id="editRruleByday_{{ todo.id }}" value="">
 <!-- Reminder offsets -->
 <div>
 <label class="text-xs mb-1 block" style="color: var(--color-text-muted);">🔔 알림</label>
 <input type="hidden" name="reminder_offsets" id="todoReminderOffsets_{{ todo.id }}" value="{{ todo.reminder_offsets or '' }}">
 <div class="flex flex-wrap gap-1 mb-1.5" id="todoOffsetChips_{{ todo.id }}"></div>
 <div class="flex gap-1.5">
 <select id="todoOffsetSel_{{ todo.id }}" class="flex-1 px-2 py-1.5 text-xs border rounded-lg" style="background: var(--color-surface);">
 <option value='{"value":0,"unit":"minute"}'>당일 오전 9시</option>
 <option value='{"value":5,"unit":"minute"}'>5분 전</option>
 <option value='{"value":10,"unit":"minute"}'>10분 전</option>
 <option value='{"value":15,"unit":"minute"}'>15분 전</option>
 <option value='{"value":30,"unit":"minute"}'>30분 전</option>
 <option value='{"value":1,"unit":"hour"}'>1시간 전</option>
 <option value='{"value":2,"unit":"hour"}'>2시간 전</option>
 <option value='{"value":3,"unit":"hour"}'>3시간 전</option>
 <option value='{"value":1,"unit":"day"}'>1일 전</option>
 <option value='{"value":2,"unit":"day"}'>2일 전</option>
 <option value='{"value":3,"unit":"day"}'>3일 전</option>
 <option value='{"value":1,"unit":"week"}'>1주 전</option>
 </select>
 <button type="button" onclick="addEditTodoOffset({{ todo.id }})" class="px-2.5 py-1 text-xs btn-primary rounded-lg">+</button>
 </div>
 <label class="flex items-center gap-1.5 mt-1.5 cursor-pointer">
 <input type="checkbox" id="todoUseDefault_{{ todo.id }}" onchange="toggleEditTodoDefault({{ todo.id }})"
 {% if not todo.reminder_offsets %}checked{% endif %} class="w-3.5 h-3.5 rounded text-amber-600">
 <span class="text-xs" style="color: var(--color-text-muted);">기본값 사용</span>
 </label>
 </div>
 <input type="text" name="tags" value="{{ (todo.tags|parse_tags)|join(', ') }}" placeholder="태그 (쉼표 구분)"
 class="w-full px-3 py-1.5 text-sm border rounded-lg">
 <div class="flex justify-end gap-2">
 <a href="/todos" hx-boost="false" class="px-4 py-2 text-sm hover-text rounded-lg hover-surface">취소</a>
 <button type="submit" onclick="collectEditByday({{ todo.id }})" class="px-5 py-2 btn-primary font-medium text-sm rounded-lg transition-colors">저장</button>
 </div>
 </form>
</div>
<script>
// --- Edit Todo Reminder Offsets ---
(function(){
 var tid = {{ todo.id }};
 var labels = {'0_minute':'당일 오전 9시','5_minute':'5분 전','10_minute':'10분 전','15_minute':'15분 전','30_minute':'30분 전','1_hour':'1시간 전','2_hour':'2시간 전','3_hour':'3시간 전','1_day':'1일 전','2_day':'2일 전','3_day':'3일 전','1_week':'1주 전'};
 var input = document.getElementById('todoReminderOffsets_'+tid);
 var offsets = [];
 try { offsets = JSON.parse(input.value || '[]'); } catch(e) { offsets = []; }
 if (!Array.isArray(offsets)) offsets = [];

 function render() {
 var c = document.getElementById('todoOffsetChips_'+tid);
 c.innerHTML = '';
 offsets.forEach(function(o, i) {
 var lbl = labels[o.value+'_'+o.unit] || (o.value+(o.unit==='minute'?'분':o.unit==='hour'?'시간':o.unit==='day'?'일':'주')+' 전');
 c.innerHTML += '<span class="inline-flex items-center gap-0.5 px-2 py-0.5 text-[11px] font-medium bg-amber-100 dark:bg-amber-900/30 text-amber-700 dark:text-amber-300 rounded-full">'+lbl+' <button type="button" onclick="removeEditTodoOffset('+tid+','+i+')" class="text-amber-500 hover-danger">&times;</button></span>';
 });
 input.value = offsets.length ? JSON.stringify(offsets) : '';
 }
 window['_todoOff'+tid] = offsets;
 window.addEditTodoOffset = function(id) {
 var sel = document.getElementById('todoOffsetSel_'+id);
 var o = JSON.parse(sel.value);
 var arr = window['_todoOff'+id];
 if (arr.some(function(x){return x.value===o.value&&x.unit===o.unit})) return;
 arr.push(o);
 offsets = arr;
 document.getElementById('todoUseDefault_'+id).checked = false;
 render();
 };
 window.removeEditTodoOffset = function(id, idx) {
 window['_todoOff'+id].splice(idx, 1);
 offsets = window['_todoOff'+id];
 render();
 };
 window.toggleEditTodoDefault = function(id) {
 if (document.getElementById('todoUseDefault_'+id).checked) {
 window['_todoOff'+id] = [];
 offsets = [];
 render();
 }
 };
 render();
})();

function toggleEditRrule(tid) {
 var sel = document.getElementById('editRepeatType_' + tid);
 var panel = document.getElementById('editRrulePanel_' + tid);
 if (sel.value === 'custom') { panel.classList.remove('hidden'); } else { panel.classList.add('hidden'); }
}
function toggleEditRruleExtra(tid) {
 var freq = document.getElementById('editRruleFreq_' + tid).value;
 document.getElementById('editBydayRow_' + tid).classList.toggle('hidden', freq !== 'WEEKLY');
 document.getElementById('editBymonthdayRow_' + tid).classList.toggle('hidden', freq !== 'MONTHLY');
}
function toggleEditEndFields(tid) {
 var et = document.getElementById('editRruleEndType_' + tid).value;
 document.getElementById('editRruleCount_' + tid).classList.toggle('hidden', et !== 'count');
 document.getElementById('editRruleUntil_' + tid).classList.toggle('hidden', et !== 'until');
}
function collectEditByday(tid) {
 var checks = document.querySelectorAll('.rrule-byday-edit-' + tid + ':checked');
 var vals = Array.from(checks).map(function(c) { return c.value; });
 document.getElementById('editRruleByday_' + tid).value = vals.join(',');
}
</script>

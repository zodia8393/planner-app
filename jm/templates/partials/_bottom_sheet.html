{# Mobile bottom sheet for adding widgets #}
<div id="widgetBottomSheet" class="fixed inset-0 z-50 hidden">
 <div class="absolute inset-0 bg-black/40" data-action="close-sheet"></div>
 <div class="absolute bottom-0 left-0 right-0 rounded-t-2xl p-5 pb-8 transform transition-transform" style="background: var(--color-surface); max-height: 60vh; overflow-y: auto;">
 <div class="flex items-center justify-between mb-4">
 <h4 class="text-sm font-bold" style="color: var(--color-text);">위젯 추가</h4>
 <button data-action="close-sheet" aria-label="시트 닫기" class="text-xs font-medium px-3 py-1.5 rounded-lg" style="color: var(--color-text-faint); min-height: 44px;">닫기</button>
 </div>
 <div id="bottomSheetWidgets" class="space-y-2"></div>
 </div>
</div>

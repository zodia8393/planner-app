<!DOCTYPE html>
<html lang="ko" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - Work Planner</title>
    <link rel="stylesheet" href="/static/tailwind.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
    <style>
        body { font-family: 'Pretendard', sans-serif; background: linear-gradient(135deg, #f8fafc 0%, #e0e7ff 50%, #f1f5f9 100%); }
        .pin-input { letter-spacing: 0.5em; text-align: center; }
    </style>
</head>
<body class="h-full flex items-center justify-center">
    <div class="w-full max-w-sm mx-4">
        <div class="bg-white rounded-2xl shadow-xl shadow-slate-200/50 p-8 text-center border border-slate-200/60">
            <div class="w-14 h-14 bg-gradient-to-br from-indigo-500 to-indigo-700 rounded-xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-indigo-500/30">
                {% if profile_emoji %}
                <span class="text-2xl">{{ profile_emoji }}</span>
                {% else %}
                <svg class="w-7 h-7 text-white" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
                </svg>
                {% endif %}
            </div>
            <h1 class="text-xl font-bold text-slate-800 mb-1">
                {% if profile_name %}{{ profile_name }}{% else %}Work Planner{% endif %}
            </h1>
            <p class="text-sm text-slate-400 mb-6">PIN을 입력하세요</p>

            {% if error %}
            <div class="mb-4 p-3 bg-red-50 border border-red-200 rounded-xl text-sm text-red-600">{{ error }}</div>
            {% endif %}

            <form action="/login" method="POST" class="space-y-4">
                <input type="password" name="pin" placeholder="PIN" maxlength="10" required autofocus
                       class="pin-input w-full px-4 py-3 text-lg font-bold bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-400 focus:border-transparent transition-all"
                       inputmode="numeric" autocomplete="off">
                <button type="submit" class="w-full py-3 bg-gradient-to-r from-indigo-500 to-indigo-600 text-white font-semibold rounded-xl shadow-lg shadow-indigo-500/30 hover:shadow-indigo-500/50 transition-all">
                    로그인
                </button>
            </form>

            <a href="/select-profile" class="inline-block mt-4 text-xs text-slate-400 hover:text-indigo-500 transition-colors">다른 프로필로 전환</a>
        </div>
    </div>
</body>
</html>

<div class="work-card rounded-xl p-5 fade-in border-2 border-indigo-300 dark:border-indigo-600" id="todo-{{ todo.id }}">
    <form hx-put="/todos/{{ todo.id }}" hx-target="#todo-{{ todo.id }}" hx-swap="outerHTML" class="space-y-3">
        <div class="flex items-center justify-between mb-2">
            <h4 class="font-bold text-sm text-indigo-600 dark:text-indigo-400">편집</h4>
            <a href="/todos" hx-boost="false" class="text-xs text-slate-400 hover:text-slate-600">취소</a>
        </div>
        <input type="text" name="title" value="{{ todo.title }}" required
               class="w-full px-4 py-2.5 text-sm bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-lg focus:ring-2 focus:ring-indigo-400">
        <textarea name="description" rows="2" placeholder="설명"
                  class="w-full px-4 py-2 text-sm bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-lg focus:ring-2 focus:ring-indigo-400">{{ todo.description }}</textarea>
        <div class="flex flex-wrap gap-2">
            <input type="date" name="due_date" value="{{ todo.due_date or '' }}"
                   class="px-3 py-1.5 text-sm bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-lg">
            <select name="priority" class="px-3 py-1.5 text-sm bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-lg">
                {% for pk, pv in priority_map.items() %}
                <option value="{{ pk }}" {% if pk == todo.priority %}selected{% endif %}>{{ pv.label }}</option>
                {% endfor %}
            </select>
            <select name="category_id" class="px-3 py-1.5 text-sm bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-lg">
                <option value="">카테고리</option>
                {% for cat in categories %}
                <option value="{{ cat.id }}" {% if cat.id == todo.category_id %}selected{% endif %}>{{ cat.name }}</option>
                {% endfor %}
            </select>
            {% set is_custom_rrule = todo.repeat_type and todo.repeat_type.startswith('FREQ=') %}
            <select name="repeat_type" id="editRepeatType_{{ todo.id }}" onchange="toggleEditRrule({{ todo.id }})"
                    class="px-3 py-1.5 text-sm bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-lg">
                {% for rk, rv in repeat_map.items() %}
                <option value="{{ rk }}" {% if (not is_custom_rrule and rk == todo.repeat_type) or (is_custom_rrule and rk == 'custom') %}selected{% endif %}>{{ rv }}</option>
                {% endfor %}
            </select>
            <select name="energy_level" class="px-3 py-1.5 text-sm bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-lg">
                <option value="1" {% if todo.energy_level == 1 %}selected{% endif %}>🟢 저에너지</option>
                <option value="2" {% if not todo.energy_level or todo.energy_level == 2 %}selected{% endif %}>🔵 보통</option>
                <option value="3" {% if todo.energy_level == 3 %}selected{% endif %}>🔥 고에너지</option>
            </select>
        </div>
        <!-- Custom RRULE builder -->
        <div id="editRrulePanel_{{ todo.id }}" class="{% if not is_custom_rrule %}hidden{% endif %} p-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg space-y-2">
            <div class="flex items-center gap-2">
                <span class="text-xs text-slate-500 whitespace-nowrap">매</span>
                <input type="number" name="rrule_interval" value="{{ todo._rrule_interval if is_custom_rrule else 1 }}" min="1" max="99"
                       class="w-16 px-2 py-1 text-xs bg-white dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-lg">
                <select name="rrule_freq" id="editRruleFreq_{{ todo.id }}" onchange="toggleEditRruleExtra({{ todo.id }})"
                        class="px-2 py-1 text-xs bg-white dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-lg">
                    <option value="DAILY" {% if is_custom_rrule and todo._rrule_freq == 'DAILY' %}selected{% endif %}>일</option>
                    <option value="WEEKLY" {% if is_custom_rrule and todo._rrule_freq == 'WEEKLY' %}selected{% endif %}>주</option>
                    <option value="MONTHLY" {% if is_custom_rrule and todo._rrule_freq == 'MONTHLY' %}selected{% endif %}>개월</option>
                    <option value="YEARLY" {% if is_custom_rrule and todo._rrule_freq == 'YEARLY' %}selected{% endif %}>년</option>
                </select>
            </div>
            <div id="editBydayRow_{{ todo.id }}" class="{% if not (is_custom_rrule and todo._rrule_freq == 'WEEKLY') %}hidden{% endif %} flex flex-wrap gap-1">
                {% for code, label in rrule_day_options %}
                <label class="flex items-center gap-0.5 px-2 py-1 text-xs bg-white dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded cursor-pointer hover:bg-indigo-50 dark:hover:bg-indigo-900/20">
                    <input type="checkbox" class="rrule-byday-edit-{{ todo.id }}" value="{{ code }}" {% if is_custom_rrule and code in (todo._rrule_byday or []) %}checked{% endif %}>
                    {{ label }}
                </label>
                {% endfor %}
            </div>
            <div id="editBymonthdayRow_{{ todo.id }}" class="{% if not (is_custom_rrule and todo._rrule_freq == 'MONTHLY') %}hidden{% endif %}">
                <input type="text" name="rrule_bymonthday" placeholder="날짜 (쉼표구분, 예: 1,15)" value="{{ todo._rrule_bymonthday_str if is_custom_rrule else '' }}"
                       class="w-full px-2 py-1 text-xs bg-white dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-lg">
            </div>
            <div class="flex items-center gap-2">
                <span class="text-xs text-slate-500 whitespace-nowrap">종료:</span>
                <select name="rrule_end_type" id="editRruleEndType_{{ todo.id }}" onchange="toggleEditEndFields({{ todo.id }})"
                        class="px-2 py-1 text-xs bg-white dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-lg">
                    <option value="never" {% if is_custom_rrule and not todo._rrule_count and not todo._rrule_until %}selected{% endif %}>무제한</option>
                    <option value="count" {% if is_custom_rrule and todo._rrule_count %}selected{% endif %}>횟수</option>
                    <option value="until" {% if is_custom_rrule and todo._rrule_until %}selected{% endif %}>날짜</option>
                </select>
                <input type="number" name="rrule_count" id="editRruleCount_{{ todo.id }}" min="1" max="999" value="{{ todo._rrule_count or 10 }}" placeholder="횟수"
                       class="{% if not (is_custom_rrule and todo._rrule_count) %}hidden{% endif %} w-20 px-2 py-1 text-xs bg-white dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-lg">
                <input type="date" name="rrule_until" id="editRruleUntil_{{ todo.id }}" value="{{ todo._rrule_until or '' }}"
                       class="{% if not (is_custom_rrule and todo._rrule_until) %}hidden{% endif %} px-2 py-1 text-xs bg-white dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-lg">
            </div>
            {% if is_custom_rrule %}
            <div class="text-[11px] text-indigo-500">{{ rrule_to_korean(todo.repeat_type) }}</div>
            {% endif %}
        </div>
        <input type="hidden" name="rrule_byday" id="editRruleByday_{{ todo.id }}" value="">
        <input type="text" name="tags" value="{{ (todo.tags|parse_tags)|join(', ') }}" placeholder="태그 (쉼표 구분)"
               class="w-full px-3 py-1.5 text-sm bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-lg">
        <div class="flex justify-end gap-2">
            <a href="/todos" hx-boost="false" class="px-4 py-2 text-sm text-slate-500 hover:text-slate-700 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700">취소</a>
            <button type="submit" onclick="collectEditByday({{ todo.id }})" class="px-5 py-2 bg-indigo-600 text-white font-medium text-sm rounded-lg hover:bg-indigo-700 transition-colors">저장</button>
        </div>
    </form>
</div>
<script>
function toggleEditRrule(tid) {
    var sel = document.getElementById('editRepeatType_' + tid);
    var panel = document.getElementById('editRrulePanel_' + tid);
    if (sel.value === 'custom') { panel.classList.remove('hidden'); } else { panel.classList.add('hidden'); }
}
function toggleEditRruleExtra(tid) {
    var freq = document.getElementById('editRruleFreq_' + tid).value;
    document.getElementById('editBydayRow_' + tid).classList.toggle('hidden', freq !== 'WEEKLY');
    document.getElementById('editBymonthdayRow_' + tid).classList.toggle('hidden', freq !== 'MONTHLY');
}
function toggleEditEndFields(tid) {
    var et = document.getElementById('editRruleEndType_' + tid).value;
    document.getElementById('editRruleCount_' + tid).classList.toggle('hidden', et !== 'count');
    document.getElementById('editRruleUntil_' + tid).classList.toggle('hidden', et !== 'until');
}
function collectEditByday(tid) {
    var checks = document.querySelectorAll('.rrule-byday-edit-' + tid + ':checked');
    var vals = Array.from(checks).map(function(c) { return c.value; });
    document.getElementById('editRruleByday_' + tid).value = vals.join(',');
}
</script>

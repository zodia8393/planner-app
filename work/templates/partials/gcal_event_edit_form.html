<div id="editEventModal" class="fixed inset-0 z-50">
 <div class="modal-backdrop absolute inset-0" onclick="document.getElementById('editEventContainer').innerHTML=''"></div>
 <div class="absolute inset-x-4 top-1/2 -translate-y-1/2 max-w-md mx-auto">
 <div class="rounded-2xl shadow-2xl p-6 border relative" style="background: var(--color-surface);">
 <button onclick="document.getElementById('editEventContainer').innerHTML=''" class="absolute top-4 right-4 hover-text" aria-label="닫기">
 <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
 <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
 </svg>
 </button>
 <h3 class="font-bold text-lg mb-1" style="color: var(--color-text);">Google 일정 편집</h3>
 <p class="text-xs mb-4 flex items-center gap-1" style="color: var(--color-text-muted);">
 <svg class="w-3.5 h-3.5" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
 Google Calendar 동기화 일정
 </p>
 <form hx-put="/events/gcal/{{ event.gcal_id }}" hx-target="#editEventContainer" hx-swap="innerHTML" class="space-y-3">
 <input type="text" name="title" value="{{ event.title }}" required
 class="w-full px-4 py-2.5 text-sm border rounded-lg focus-accent">
 <div class="grid grid-cols-2 gap-2">
 <div>
 <label class="text-xs mb-1 block" style="color: var(--color-text-muted);">시작</label>
 <input type="datetime-local" name="start_time" value="{{ event.start_time }}"
 class="w-full px-3 py-2 text-sm border rounded-lg"
>
 </div>
 <div>
 <label class="text-xs mb-1 block" style="color: var(--color-text-muted);">종료</label>
 <input type="datetime-local" name="end_time" value="{{ event.end_time or '' }}"
 class="w-full px-3 py-2 text-sm border rounded-lg"
>
 </div>
 </div>
 <textarea name="memo" placeholder="메모" rows="2"
 class="w-full px-4 py-2 text-sm border rounded-lg">{{ event.memo or '' }}</textarea>
 <div class="flex gap-2">
 <button type="submit" class="flex-1 py-2.5 btn-primary font-medium rounded-lg transition-colors text-sm">
 저장
 </button>
 <button type="button" onclick="if(confirm('삭제할까요?'))fetch('/events/gcal/{{ event.gcal_id }}',{method:'DELETE'}).finally(function(){location.reload()})"
 class="px-4 py-2.5 font-medium rounded-lg hover-danger-bg transition-colors text-sm" style="background: var(--color-danger-soft); color: var(--color-danger);">
 삭제
 </button>
 </div>
 </form>
 </div>
 </div>
</div>

{# Upcoming Widget: next 5 events/deadlines #}
<div data-widget="upcoming" class="work-card rounded-xl overflow-hidden card-hover">
    <div class="flex items-center justify-between px-4 py-3 border-b border-slate-100 dark:border-slate-700">
        <h3 class="text-sm font-bold text-slate-700 dark:text-slate-300">다가오는 일정</h3>
        <a href="/calendar" class="text-xs text-indigo-500 hover:underline" aria-label="캘린더에서 더 보기">더보기</a>
    </div>
    <div class="divide-y divide-slate-100 dark:divide-slate-700" role="list" aria-label="다가오는 일정 목록">
        {% for item in upcoming_items %}
        <div class="flex items-center gap-3 px-4 py-2.5 hover:bg-slate-50 dark:hover:bg-slate-700/30 transition-colors" role="listitem">
            <div class="w-1 h-8 rounded-full flex-shrink-0
                {% if item.type == 'todo' %}bg-indigo-500
                {% elif item.type == 'event' %}bg-emerald-500
                {% elif item.type == 'deadline' %}bg-red-500
                {% else %}bg-slate-400{% endif %}"></div>
            <div class="flex-1 min-w-0">
                <p class="text-sm font-medium text-slate-700 dark:text-slate-200 truncate">{{ item.title }}</p>
                <p class="text-[11px] text-slate-400">{{ item.relative_time }}</p>
            </div>
            <span class="text-[11px] font-medium px-2 py-0.5 rounded-md flex-shrink-0
                {% if item.type == 'todo' %}bg-indigo-50 dark:bg-indigo-900/20 text-indigo-600 dark:text-indigo-400
                {% elif item.type == 'event' %}bg-emerald-50 dark:bg-emerald-900/20 text-emerald-600 dark:text-emerald-400
                {% elif item.type == 'deadline' %}bg-red-50 dark:bg-red-900/20 text-red-600 dark:text-red-400
                {% else %}bg-slate-100 dark:bg-slate-700 text-slate-500{% endif %}">
                {% if item.type == 'todo' %}할일{% elif item.type == 'event' %}일정{% elif item.type == 'deadline' %}마감{% endif %}
            </span>
        </div>
        {% else %}
        <div class="py-6 text-center">
            <p class="text-xs text-slate-400">예정된 일정이 없습니다</p>
        </div>
        {% endfor %}
    </div>
</div>

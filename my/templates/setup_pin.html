<!DOCTYPE html>
<html lang="ko" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIN 설정 - MY PLANNER</title>
    <link rel="stylesheet" href="/static/tailwind.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
    <style>
        body { font-family: 'Pretendard', sans-serif; background: linear-gradient(135deg, #f8fafc 0%, #fef3c7 50%, #f1f5f9 100%); }
        .pin-input { letter-spacing: 0.5em; text-align: center; font-size: 1.5rem; font-weight: 700; }
        .pin-input:focus { box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.3); }
    </style>
</head>
<body class="h-full flex items-center justify-center">
    <div class="w-full max-w-sm mx-4">
        <div class="rounded-2xl shadow-xl p-8 text-center border" style="background: var(--color-surface); border-color: var(--color-border);">
            <div class="w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-5" style="background: var(--color-accent);">
                <svg class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
                </svg>
            </div>
            <h1 class="text-xl font-bold mb-2" style="color: var(--color-text);">PIN 설정</h1>
            <p class="text-sm mb-6" style="color: var(--color-text-faint);">보안을 위해 4자리 이상 PIN을 설정해주세요</p>

            {% if error %}
            <div class="mb-4 p-3 bg-red-50 border border-red-200 rounded-xl text-sm text-red-600">{{ error }}</div>
            {% endif %}

            <form action="/auth/setup-pin" method="POST" id="pinForm">
                <input type="password" name="pin" id="pinInput" aria-label="PIN 입력" inputmode="numeric" pattern="[0-9]*" minlength="4" maxlength="8" required autofocus
                       class="pin-input w-full px-4 py-3 border-2 rounded-xl pin-focus focus:outline-none transition-all mb-4" style="background: var(--color-border-subtle); border-color: var(--color-border);"
                       placeholder="····">

                <input type="password" name="pin_confirm" id="pinConfirm" aria-label="PIN 확인" inputmode="numeric" pattern="[0-9]*" minlength="4" maxlength="8" required
                       class="pin-input w-full px-4 py-3 border-2 rounded-xl pin-focus focus:outline-none transition-all mb-2" style="background: var(--color-border-subtle); border-color: var(--color-border);"
                       placeholder="····">
                <p id="matchError" class="text-xs text-red-500 mb-4 hidden">PIN이 일치하지 않습니다</p>

                <button type="submit" class="w-full py-3 text-white font-bold rounded-xl transition-all btn-primary">
                    설정 완료
                </button>
            </form>

            <a href="/" class="inline-block mt-4 text-xs hover-text transition-colors" style="color: var(--color-text-faint);">나중에 설정하기</a>
        </div>
    </div>
    <script>
        document.getElementById('pinForm').addEventListener('submit', function(e) {
            const pin = document.getElementById('pinInput').value;
            const confirm = document.getElementById('pinConfirm').value;
            if (pin !== confirm) {
                e.preventDefault();
                document.getElementById('matchError').classList.remove('hidden');
                document.getElementById('pinConfirm').classList.add('border-red-400');
                return;
            }
        });
        document.getElementById('pinConfirm').addEventListener('input', function() {
            document.getElementById('matchError').classList.add('hidden');
            this.classList.remove('border-red-400');
        });
    </script>
</body>
</html>

<div class="work-card rounded-xl p-4 fade-in border-2" style="border-color: var(--color-accent);" data-notice-id="{{ notice.id }}">
 <form hx-put="/notices/{{ notice.id }}" hx-target="closest [data-notice-id]" hx-swap="outerHTML" class="space-y-2">
 <div class="flex items-center justify-between mb-1">
 <h4 class="font-bold text-sm" style="color: var(--color-accent);">공지 편집</h4>
 <a href="/notices" hx-boost="false" class="text-xs hover-text">취소</a>
 </div>
 <input type="text" name="title" value="{{ notice.title }}" placeholder="공지 제목" required
 class="w-full px-3 py-2 text-sm border rounded-lg focus:ring-2 focus:ring-amber-400">
 <textarea name="content" rows="3" placeholder="공지 내용"
 class="w-full px-3 py-2 text-sm border rounded-lg focus:ring-2 focus:ring-amber-400 resize-none">{{ notice.content or '' }}</textarea>
 <div class="flex gap-2 items-center">
 <label class="flex items-center gap-2 text-sm cursor-pointer">
 <input type="checkbox" name="priority" value="1" {% if notice.priority == 1 %}checked{% endif %}
 class="w-4 h-4 rounded text-red-600 focus:ring-red-500">
 <span class="text-xs font-medium">중요</span>
 </label>
 <div class="flex-1"></div>
 <a href="/notices" hx-boost="false" class="px-3 py-1.5 text-sm hover-text rounded-lg hover-surface">취소</a>
 <button type="submit" class="px-4 py-1.5 bg-amber-600 text-white font-medium text-sm rounded-lg hover:bg-amber-700 transition-colors">저장</button>
 </div>
 </form>
</div>

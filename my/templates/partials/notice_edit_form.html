<div class="work-card rounded-xl p-4 fade-in border-2 border-indigo-300 dark:border-indigo-600" data-notice-id="{{ notice.id }}">
    <form hx-put="/notices/{{ notice.id }}" hx-target="closest [data-notice-id]" hx-swap="outerHTML" class="space-y-2">
        <div class="flex items-center justify-between mb-1">
            <h4 class="font-bold text-sm text-indigo-600 dark:text-indigo-400">공지 편집</h4>
            <a href="/notices" hx-boost="false" class="text-xs text-slate-400 hover:text-slate-600">취소</a>
        </div>
        <input type="text" name="title" value="{{ notice.title }}" placeholder="공지 제목" required
               class="w-full px-3 py-2 text-sm bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-lg focus:ring-2 focus:ring-indigo-400">
        <textarea name="content" rows="3" placeholder="공지 내용"
                  class="w-full px-3 py-2 text-sm bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-lg focus:ring-2 focus:ring-indigo-400 resize-none">{{ notice.content or '' }}</textarea>
        <div class="flex gap-2 items-center">
            <label class="flex items-center gap-2 text-sm text-slate-600 dark:text-slate-300 cursor-pointer">
                <input type="checkbox" name="priority" value="1" {% if notice.priority == 1 %}checked{% endif %}
                       class="w-4 h-4 rounded border-slate-300 text-red-600 focus:ring-red-500">
                <span class="text-xs font-medium">중요</span>
            </label>
            <div class="flex-1"></div>
            <a href="/notices" hx-boost="false" class="px-3 py-1.5 text-sm text-slate-500 hover:text-slate-700 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700">취소</a>
            <button type="submit" class="px-4 py-1.5 bg-indigo-600 text-white font-medium text-sm rounded-lg hover:bg-indigo-700 transition-colors">저장</button>
        </div>
    </form>
</div>

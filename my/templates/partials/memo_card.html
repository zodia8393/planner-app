<div class="work-card rounded-xl p-4 card-hover fade-in group relative" data-memo-id="{{ memo.id }}">
    <div class="flex items-start justify-between mb-1.5">
        <div class="flex items-center gap-2 min-w-0 flex-wrap">
            {% if memo.category_name %}
            <span class="inline-flex items-center gap-1 text-xs font-medium px-2 py-0.5 rounded-full flex-shrink-0"
                  style="background:{{ memo.category_color }}15; color:{{ memo.category_color }}">
                <span class="w-1.5 h-1.5 rounded-full" style="background:{{ memo.category_color }}"></span>
                {{ memo.category_name }}
            </span>
            {% endif %}
            {% if memo.author %}
            <span class="text-xs font-medium bg-amber-100 dark:bg-amber-900/30 text-amber-600 dark:text-amber-400 px-2 py-0.5 rounded-full flex-shrink-0">{{ memo.author }}</span>
            {% endif %}
            <span class="text-xs text-slate-400 truncate">{{ memo.created_at|format_datetime }}</span>
        </div>
        <div class="flex items-center gap-0.5 flex-shrink-0">
            <button hx-get="/memos/{{ memo.id }}/edit" hx-target="closest [data-memo-id]" hx-swap="outerHTML"
                    class="lg:opacity-0 lg:group-hover:opacity-100 p-2 rounded hover:bg-amber-50 dark:hover:bg-amber-900/20 text-slate-400 hover:text-amber-500 transition-all">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L10.582 16.07a4.5 4.5 0 01-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 011.13-1.897l8.932-8.931zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0115.75 21H5.25A2.25 2.25 0 013 18.75V8.25A2.25 2.25 0 015.25 6H10" />
                </svg>
            </button>
            <button onclick="if(confirm('이 메모를 삭제할까요?'))fetch('/memos/{{ memo.id }}',{method:'DELETE'}).finally(function(){location.reload()})"
                    class="lg:opacity-0 lg:group-hover:opacity-100 p-2 rounded hover:bg-red-50 dark:hover:bg-red-900/20 text-slate-400 hover:text-red-500 transition-all">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0" />
                </svg>
            </button>
        </div>
    </div>
    {% if memo.title %}
    <p class="text-sm font-bold text-slate-800 dark:text-white mb-1">{{ memo.title }}</p>
    {% endif %}
    <div class="memo-content text-sm text-slate-600 dark:text-slate-300 leading-relaxed">{{ memo.content }}</div>
</div>

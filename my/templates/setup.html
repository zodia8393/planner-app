<!DOCTYPE html>
<html lang="ko" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>시작하기 - My Planner</title>
    <meta name="theme-color" content="#b45309">
    <link rel="stylesheet" href="/static/tailwind.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Pretendard', '-apple-system', 'BlinkMacSystemFont', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
    <style>
        .setup-bg {
            background: linear-gradient(135deg, #eef2ff 0%, #f8fafc 50%, #fef3c7 100%);
            min-height: 100vh;
        }
        .dark .setup-bg {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #312e81 100%);
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .float-anim { animation: float 3s ease-in-out infinite; }
    </style>
</head>
<body class="setup-bg text-slate-800 dark:text-slate-200">
<div class="min-h-screen flex items-center justify-center px-4">
    <div class="w-full max-w-sm">
        <!-- Logo area -->
        <div class="text-center mb-8">
            <div class="w-20 h-20 bg-gradient-to-br from-amber-500 via-amber-600 to-amber-700 rounded-2xl flex items-center justify-center mx-auto shadow-xl shadow-amber-500/30 float-anim">
                <svg class="w-10 h-10 text-white" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h3.75M9 15h3.75M9 18h3.75m3 .75H18a2.25 2.25 0 002.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 00-1.123-.08m-5.801 0c-.065.21-.1.433-.1.664 0 .414.336.75.75.75h4.5a.75.75 0 00.75-.75 2.25 2.25 0 00-.1-.664m-5.8 0A2.251 2.251 0 0113.5 2.25H15c1.012 0 1.867.668 2.15 1.586m-5.8 0c-.376.023-.75.05-1.124.08C9.095 4.01 8.25 4.973 8.25 6.108V8.25m0 0H4.875c-.621 0-1.125.504-1.125 1.125v11.25c0 .621.504 1.125 1.125 1.125h9.75c.621 0 1.125-.504 1.125-1.125V9.375c0-.621-.504-1.125-1.125-1.125H8.25zM6.75 12h.008v.008H6.75V12zm0 3h.008v.008H6.75V15zm0 3h.008v.008H6.75V18z" />
                </svg>
            </div>
            <h1 class="text-2xl font-bold mt-5 bg-gradient-to-r from-amber-700 to-slate-600 bg-clip-text text-transparent dark:from-amber-400 dark:to-slate-300">My Planner</h1>
            <p class="text-sm text-slate-500 dark:text-slate-400 mt-1">나만의 플래너를 시작하세요</p>
        </div>

        {% if profiles %}
        <!-- Existing profiles -->
        <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-xl border border-slate-200/60 dark:border-slate-700 p-6 mb-4">
            <p class="text-sm font-semibold text-slate-700 dark:text-slate-200 mb-3">기존 프로필로 접속</p>
            <div class="space-y-2">
                {% for p in profiles %}
                <form action="/setup/select" method="POST">
                    <input type="hidden" name="profile_id" value="{{ p.id }}">
                    <button type="submit"
                            class="w-full flex items-center gap-3 px-4 py-3 bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-xl hover:bg-amber-50 dark:hover:bg-amber-900/20 hover:border-amber-300 dark:hover:border-amber-600 transition-all text-left group">
                        <div class="w-9 h-9 bg-amber-100 dark:bg-amber-900/40 rounded-lg flex items-center justify-center text-amber-600 dark:text-amber-400 font-bold text-sm flex-shrink-0">
                            {{ p.name[:1] }}
                        </div>
                        <div class="flex-1 min-w-0">
                            <div class="text-sm font-medium text-slate-700 dark:text-slate-200">{{ p.name }}</div>
                            <div class="text-xs text-slate-400">{{ p.created_at[:10] if p.created_at else '' }}</div>
                        </div>
                        <svg class="w-4 h-4 text-slate-300 group-hover:text-amber-500 transition-colors flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" />
                        </svg>
                    </button>
                </form>
                {% endfor %}
            </div>
        </div>

        <div class="flex items-center gap-3 mb-4">
            <div class="flex-1 h-px bg-slate-200 dark:bg-slate-700"></div>
            <span class="text-xs text-slate-400 dark:text-slate-500">또는</span>
            <div class="flex-1 h-px bg-slate-200 dark:bg-slate-700"></div>
        </div>
        {% endif %}

        <!-- New profile form -->
        <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-xl border border-slate-200/60 dark:border-slate-700 p-6">
            <form action="/setup" method="POST" class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 dark:text-slate-200 mb-2">{% if profiles %}새 프로필 만들기{% else %}이름{% endif %}</label>
                    <input type="text" name="name" placeholder="사용할 이름을 입력하세요" required {% if not profiles %}autofocus{% endif %}
                           maxlength="50"
                           class="w-full px-4 py-3 text-sm bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-xl focus:ring-2 focus:ring-amber-400 focus:border-transparent transition-all">
                </div>
                <button type="submit"
                        class="w-full py-3 bg-gradient-to-r from-amber-600 to-amber-700 text-white font-semibold rounded-xl hover:from-amber-700 hover:to-amber-800 transition-all shadow-lg shadow-amber-500/30 text-sm">
                    {% if profiles %}새 프로필로 시작{% else %}시작하기{% endif %}
                </button>
            </form>
        </div>

        <!-- Google login -->
        <div class="mt-4">
            <div class="flex items-center gap-3 mb-4">
                <div class="flex-1 h-px bg-slate-200 dark:bg-slate-700"></div>
                <span class="text-xs text-slate-400 dark:text-slate-500">또는</span>
                <div class="flex-1 h-px bg-slate-200 dark:bg-slate-700"></div>
            </div>
            <a href="/auth/google/login"
               class="w-full flex items-center justify-center gap-3 px-4 py-3 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-600 rounded-xl hover:bg-slate-50 dark:hover:bg-slate-700 transition-all shadow-sm text-sm font-medium text-slate-700 dark:text-slate-200">
                <svg class="w-5 h-5" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Google로 로그인
            </a>
        </div>

        <!-- Item 3: 3 Strengths Cards -->
        <div class="mt-6 space-y-3">
            <div class="flex items-center gap-3 px-4 py-3 bg-white/70 dark:bg-slate-800/70 rounded-xl border border-slate-200/50 dark:border-slate-700/50">
                <span class="text-2xl">📋</span>
                <div>
                    <p class="text-sm font-semibold text-slate-700 dark:text-slate-200">13종 업무 양식</p>
                    <p class="text-xs text-slate-500 dark:text-slate-400">품의서, 회의록, 출장보고서 등 바로 사용</p>
                </div>
            </div>
            <div class="flex items-center gap-3 px-4 py-3 bg-white/70 dark:bg-slate-800/70 rounded-xl border border-slate-200/50 dark:border-slate-700/50">
                <span class="text-2xl">⏱️</span>
                <div>
                    <p class="text-sm font-semibold text-slate-700 dark:text-slate-200">Pomodoro + 시간예산</p>
                    <p class="text-xs text-slate-500 dark:text-slate-400">집중 타이머와 카테고리별 시간 관리</p>
                </div>
            </div>
            <div class="flex items-center gap-3 px-4 py-3 bg-white/70 dark:bg-slate-800/70 rounded-xl border border-slate-200/50 dark:border-slate-700/50">
                <span class="text-2xl">🆓</span>
                <div>
                    <p class="text-sm font-semibold text-slate-700 dark:text-slate-200">완전 무료 · 광고 없음</p>
                    <p class="text-xs text-slate-500 dark:text-slate-400">모든 기능을 제한 없이 사용하세요</p>
                </div>
            </div>
        </div>

        <p class="text-center text-xs text-slate-400 dark:text-slate-500 mt-6">
            이 브라우저에서 자동으로 로그인됩니다
        </p>
    </div>
</div>

<script>
    if (localStorage.getItem('darkMode') === 'true' || (!localStorage.getItem('darkMode') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
    }
</script>
</body>
</html>
